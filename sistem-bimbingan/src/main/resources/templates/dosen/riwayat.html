<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Bimbingan - SI Jadwal Bimbingan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/sidebar :: sidebar-dosen}"></div>

<div class="main-content p-4">

    <h3 class="fw-bold mb-1">Riwayat Bimbingan</h3>
        <p class="text-muted mb-4">
            Riwayat seluruh proses bimbingan mahasiswa.
        </p>

        <div class="card p-4">

            <h5 class="fw-bold mb-3">
                <i class="bi bi-clock-history text-primary me-2"></i>
                Riwayat Bimbingan
            </h5>

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Mahasiswa</th>
                        <th>Program Studi</th>
                        <th>NIM</th>
                        <th>Semester</th>
                        <th>Judul</th>
                        <th>Topik</th>
                        <th>Tanggal Pengajuan</th>
                        <th>Status</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:if="${#lists.isEmpty(riwayatList)}">
                        <td colspan="9"
                            class="text-center text-muted py-4">
                            Belum ada riwayat bimbingan.
                        </td>
                    </tr>

                    <tr th:each="j,iter : ${riwayatList}">

                        <td th:text="${iter.count}"></td>

                        <td th:text="${j.mahasiswa.user.nama}"></td>

                        <td th:text="${j.mahasiswa.prodi}"></td>

                        <td th:text="${j.mahasiswa.nim}"></td>

                        <td th:text="${j.mahasiswa.semester}"></td>

                        <td th:text="${j.pengajuan.judul}"></td>

                        <td th:text="${j.pengajuan.topik}"></td>

                        <td th:text="${j.pengajuan.createdAt != null ?
                  #temporals.format(j.pengajuan.createdAt,'dd-MM-yyyy')
                  : '-'}"></td>

                        <td>
        <span class="badge bg-success"
              th:if="${j.status == 'SELESAI'}">
            SELESAI
        </span>

                            <span class="badge bg-danger"
                                  th:if="${j.status == 'DIBATALKAN'}">
            DIBATALKAN
        </span>
                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
