<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Informasi Jadwal Bimbingan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="card p-4">
            <div class="text-center mb-3">
                <i class="bi bi-mortarboard-fill text-primary" style="font-size: 3rem;"></i>
                <h4 class="fw-bold mt-2 text-primary">Jadwal Bimbingan</h4>
                <p class="text-muted">Silakan login untuk melanjutkan</p>
            </div>

            <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
            <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

            <form th:action="@{/login}" th:object="${loginDTO}" method="post">
                <div class="mb-3">
                    <label class="form-label">Login Sebagai</label>
                    <select class="form-select" th:field="*{role}" required>
                        <option value="">Pilih Sebagai</option>
                        <option value="MAHASISWA">Mahasiswa</option>
                        <option value="DOSEN">Dosen</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light-blue"><i class="bi bi-envelope-fill text-primary"></i></span>
                        <input type="email" class="form-control" th:field="*{email}" placeholder="Email" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light-blue"><i class="bi bi-lock-fill text-primary"></i></span>
                        <input type="password" class="form-control" th:field="*{password}" placeholder="Password" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Login
                </button>
            </form>

            <hr class="my-4">

            <p class="text-center mb-2 text-muted">Belum punya akun?</p>
            <div class="d-flex gap-2">
                <a href="/register-mahasiswa" class="btn btn-outline-primary w-50">
                    <i class="bi bi-person-plus me-1"></i> Daftar Mahasiswa
                </a>
                <a href="/register-dosen" class="btn btn-outline-primary w-50">
                    <i class="bi bi-person-badge me-1"></i> Daftar Dosen
                </a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
