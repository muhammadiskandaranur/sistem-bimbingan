<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Profil Mahasiswa</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/sidebar :: sidebar-mahasiswa}"></div>

<div class="container"
     style="margin-left:270px;padding-top:90px;max-width:1100px;">

    <h2 class="mb-4">
        <i class="bi bi-person-circle"></i>
        Profil Saya
    </h2>

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card shadow border-0">

                <div class="card-body">

                    <h4 class="mb-4">
                        Edit Profil
                    </h4>

                    <form th:action="@{/mahasiswa/profil/update}" method="post">

                        <div class="mb-3">
                            <label>Nama Lengkap</label>
                            <input type="text"
                                   name="nama"
                                   class="form-control"
                                   th:value="${mahasiswa.user.nama}">
                        </div>

                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email"
                                   name="email"
                                   class="form-control"
                                   th:value="${mahasiswa.user.email}">
                        </div>

                        <div class="mb-3">
                            <label>No HP</label>
                            <input type="text"
                                   name="noHp"
                                   class="form-control"
                                   th:value="${mahasiswa.user.noHp}">
                        </div>

                        <div class="mb-3">
                            <label>NIM</label>
                            <input type="text"
                                   name="nim"
                                   class="form-control"
                                   th:value="${mahasiswa.nim}">
                        </div>

                        <div class="mb-3">
                            <label>Program Studi</label>
                            <input type="text"
                                   name="prodi"
                                   class="form-control"
                                   th:value="${mahasiswa.prodi}">
                        </div>

                        <div class="mb-3">
                            <label>Semester</label>
                            <input type="number"
                                   name="semester"
                                   class="form-control"
                                   th:value="${mahasiswa.semester}">
                        </div>

                        <button class="btn btn-primary">
                            <i class="bi bi-save"></i>
                            Simpan Perubahan
                        </button>

                    </form>

                </div>

            </div>

        </div>

        <div class="col-lg-4">

            <div class="card shadow border-0">

                <div class="card-body">

                    <h4 class="mb-4">
                        Ubah Password
                    </h4>

                    <form th:action="@{/mahasiswa/password}" method="post">

                        <div class="mb-3">
                            <label>Password Lama</label>
                            <input type="password"
                                   name="oldPassword"
                                   class="form-control">
                        </div>

                        <div class="mb-3">
                            <label>Password Baru</label>
                            <input type="password"
                                   name="newPassword"
                                   class="form-control">
                        </div>

                        <button class="btn btn-outline-primary">
                            <i class="bi bi-key"></i>
                            Ubah Password
                        </button>

                    </form>

                </div>

            </div>

            <div class="card shadow border-0 mt-4">

                <div class="card-body">

                    <h5 class="text-primary">
                        Informasi Akun
                    </h5>

                    <p><strong>Nama:</strong> <span th:text="${mahasiswa.user.nama}"></span></p>
                    <p><strong>Email:</strong> <span th:text="${mahasiswa.user.email}"></span></p>
                    <p><strong>Role:</strong> Mahasiswa</p>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
