<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengajuan Masuk - SI Jadwal Bimbingan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/sidebar :: sidebar-dosen}"></div>

<div class="main-content p-4">
    <h3 class="fw-bold mb-1">Pengajuan Bimbingan Masuk</h3>
    <p class="text-muted mb-4">Kelola pengajuan bimbingan dari mahasiswa</p>

    <div class="card p-4">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Mahasiswa</th>
                    <th>NIM</th>
                    <th>Program Studi</th>
                    <th>Judul</th>
                    <th>Topik</th>
                    <th>Tanggal Ajukan</th>


                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(pengajuanList)}">
                    <td colspan="9" class="text-center text-muted py-4">Belum ada pengajuan bimbingan masuk.</td>
                </tr>
                <tr th:each="p, iter : ${pengajuanList}">
                    <td th:text="${iter.count}">1</td>
                    <td th:text="${p.mahasiswa.user.nama}">Nama Mahasiswa</td>
                    <td th:text="${p.mahasiswa.nim}">12345678</td>
                    <td th:text="${p.mahasiswa.prodi}">Informatika</td>
                    <td th:text="${p.judul}">Judul</td>
                    <td th:text="${p.topik}">Topik</td>
                    <td th:text="${#temporals.format(p.createdAt, 'dd-MM-yyyy HH:mm')}">01-01-2026</td>

                    <td>
                        <div th:if="${p.status == 'MENUNGGU'}" class="d-flex gap-2">
                            <a th:href="@{/pengajuan/terima/{id}(id=${p.id})}" class="btn btn-success btn-sm">
                                <i class="bi bi-check-lg"></i> Terima
                            </a>
                            
                            </a>
                        </div>
                        <span th:if="${p.status != 'MENUNGGU'}" class="text-muted small">-</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
