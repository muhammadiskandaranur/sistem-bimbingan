<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Riwayat Bimbingan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/sidebar :: sidebar-mahasiswa}"></div>

<div class="main-content p-4">

    <h3 class="fw-bold mb-1">Riwayat Bimbingan</h3>
    <p class="text-muted mb-4">
        Riwayat pengajuan dan jadwal yang telah selesai.
    </p>
    <!-- TABEL  -->
    <div class="card shadow border-0">

        <div class="card-header bg-primary text-white">
            <i class="bi bi-calendar-check me-2"></i>
            Riwayat Jadwal Bimbingan
        </div>

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead class="table-light">
                    <tr>
                        <th>Dosen</th>
                        <th>Judul</th>
                        <th>Topik</th>
                        <th>Tanggal Pengajuan</th>
                        <th>Jam Bimbingan</th>
                        <th>Ruang</th>
                        <th>Catatan</th>
                        <th>Status</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:if="${#lists.isEmpty(pengajuanList)}">
                        <td colspan="8" class="text-center text-muted py-4">
                            Belum ada riwayat bimbingan.
                        </td>
                    </tr>

                    <tr th:each="j : ${riwayatJadwal}">

                        <td th:text="${j.dosen.user.nama}"></td>

                        <td th:text="${j.pengajuan.judul}"></td>

                        <td th:text="${j.pengajuan.topik}"></td>

                        <td th:text="${#temporals.format(j.pengajuan.createdAt,'dd-MM-yyyy')}"></td>

                        <td th:text="${j.jamMulai + ' - ' + j.jamSelesai}"></td>

                        <td th:text="${j.tempat}"></td>

                        <td th:text="${j.catatan}"></td>

                        <td>

    <span class="badge bg-success"
          th:if="${j.status == 'SELESAI'}">
        SELESAI
    </span>

                            <span class="badge bg-danger"
                                  th:if="${j.status == 'DIBATALKAN'}">
        DIBATALKAN
    </span>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
