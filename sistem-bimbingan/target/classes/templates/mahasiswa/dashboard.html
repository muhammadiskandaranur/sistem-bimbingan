<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard Mahasiswa</title>
    <!DOCTYPE html>

    <html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Dashboard Mahasiswa</title>


        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

        <link rel="stylesheet" th:href="@{/css/style.css}">


    </head>
    <body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div th:replace="~{fragments/sidebar :: sidebar-mahasiswa}"></div>

    <div class="main-content p-4">


        <h3 class="fw-bold mb-1">
            Dashboard Mahasiswa
        </h3>

        <p class="text-muted mb-4">
            Selamat datang,
            <span th:text="${session.nama}">Mahasiswa</span> 👋
        </p>

        <div class="row g-3 mb-4">

            <div class="col-md-6">
                <div class="card card-stat bg-blue-grad p-4">
                    <div class="d-flex justify-content-between align-items-center">

                        <div>
                            <h6 class="mb-1 opacity-75">
                                Jumlah Pengajuan
                            </h6>

                            <h2 class="fw-bold mb-0"
                                th:text="${jumlahPengajuan}">
                                0
                            </h2>
                        </div>

                        <i class="bi bi-send-check"
                           style="font-size:2.5rem;opacity:.6;"></i>

                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card card-stat p-4"
                     style="background:linear-gradient(135deg,#198754,#6cc090);">

                    <div class="d-flex justify-content-between align-items-center">

                        <div>
                            <h6 class="mb-1 opacity-75">
                                Jadwal Mendatang
                            </h6>

                            <h2 class="fw-bold mb-0"
                                th:text="${jumlahJadwalMendatang}">
                                0
                            </h2>
                        </div>

                        <i class="bi bi-calendar-event"
                           style="font-size:2.5rem;opacity:.6;"></i>

                    </div>

                </div>
            </div>

        </div>

        <!-- TABEL JADWAL -->

        <div class="card p-4">

            <h5 class="fw-bold mb-3">
                <i class="bi bi-file-earmark-text text-primary me-2"></i>
                Pengajuan Bimbingan
            </h5>

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead>
                    <tr>
                        <th>Judul</th>
                        <th>Topik</th>
                        <th>Tanggal Pengajuan</th>
                        <th>Jam Pengajuan</th>
                        <th>Status</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:if="${#lists.isEmpty(pengajuanList)}">
                        <td colspan="5"
                            class="text-center text-muted py-4">
                            Belum ada pengajuan bimbingan.
                        </td>
                    </tr>

                    <tr th:each="p : ${pengajuanList}">

                        <td th:text="${p.judul}"></td>

                        <td th:text="${p.topik}"></td>

                        <td th:text="${#temporals.format(p.createdAt,'dd-MM-yyyy')}"></td>

                        <td th:text="${#temporals.format(p.createdAt,'HH:mm')}"></td>

                        <td>

                    <span class="badge bg-warning text-dark"
                          th:if="${p.status == 'MENUNGGU'}">
                        MENUNGGU
                    </span>

                            <span class="badge bg-primary"
                                  th:if="${p.status == 'DITERIMA'}">
                        DITERIMA
                    </span>

                            <span class="badge bg-danger"
                                  th:if="${p.status == 'DITOLAK'}">
                        DITUNDA
                    </span>
                            <span class="badge bg-secondary"
                                  th:if="${p.status == 'JADWAL_DIUBAH'}">
    JADWAL DIUBAH
</span>
                            <span class="badge bg-info"
                                  th:if="${p.status == 'TERJADWAL'}">
                        TERJADWAL
                    </span>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    </body>
    </html>
