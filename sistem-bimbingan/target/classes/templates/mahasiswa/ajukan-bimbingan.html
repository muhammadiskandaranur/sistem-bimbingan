<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Ajukan Bimbingan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/sidebar :: sidebar-mahasiswa}"></div>

<div class="main-content p-4">

    <h3 class="fw-bold mb-1">
        Ajukan Bimbingan
    </h3>

    <p class="text-muted mb-4">
        Kirim pengajuan bimbingan kepada dosen pembimbing.
    </p>

    <div class="card shadow border-0">

        <div class="card-body p-4">

            <div class="alert alert-success"
                 th:if="${success}">
                <span th:text="${success}"></span>
            </div>

            <form th:action="@{/mahasiswa/ajukan-bimbingan}"
                  method="post">

                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Dosen Pembimbing
                    </label>

                    <select class="form-select"
                            name="dosenId"
                            required>

                        <option value="">
                            Pilih Dosen
                        </option>

                        <option th:each="dosen : ${daftarDosen}"
                                th:value="${dosen.id}"
                                th:text="${dosen.user.nama}">
                        </option>

                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Judul Bimbingan
                    </label>

                    <input type="text"
                           name="judul"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Topik / Permasalahan
                    </label>

                    <textarea name="topik"
                              rows="5"
                              class="form-control"
                              required></textarea>
                </div>

                <button type="submit"
                        class="btn btn-primary">
                    <i class="bi bi-send-fill me-1"></i>
                    Kirim Pengajuan
                </button>

            </form>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
