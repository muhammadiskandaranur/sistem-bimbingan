<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Jadwal Bimbingan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/sidebar :: sidebar-mahasiswa}"></div>

<div class="main-content p-4">

    <h3 class="fw-bold mb-1">
        Jadwal Bimbingan
    </h3>

    <p class="text-muted mb-4">
        Daftar jadwal bimbingan yang telah disetujui dosen.
    </p>

    <div class="card shadow border-0">

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead class="table-light">
                    <tr>
                        <th>Nama Dosen</th>
                        <th>Tanggal</th>
                        <th>Jam Mulai</th>
                        <th>Jam Selesai</th>
                        <th>Tempat</th>
                        <th>Catatan</th>
                        <th>Status</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:if="${#lists.isEmpty(jadwalList)}">
                        <td colspan="7"
                            class="text-center text-muted py-4">
                            Belum ada jadwal bimbingan
                        </td>
                    </tr>

                    <tr th:each="jadwal : ${jadwalList}">

                        <td th:text="${jadwal.dosen.user.nama}"></td>

                        <td th:text="${jadwal.tanggal}"></td>

                        <td th:text="${jadwal.jamMulai}"></td>

                        <td th:text="${jadwal.jamSelesai}"></td>

                        <td th:text="${jadwal.tempat}"></td>

                        <td th:text="${jadwal.catatan}"></td>

                        <td>
        <span class="badge bg-success"
              th:text="${jadwal.status}">
        </span>
                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
