<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Mahasiswa - SI Jadwal Bimbingan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-wrapper py-5">
    <div class="auth-card" style="max-width: 560px;">
        <div class="card p-4">
            <div class="text-center mb-3">
                <i class="bi bi-person-plus-fill text-primary" style="font-size: 3rem;"></i>
                <h4 class="fw-bold mt-2 text-primary">Registrasi Mahasiswa</h4>
                <p class="text-muted">Lengkapi data diri Anda</p>
            </div>

            <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

            <form th:action="@{/register-mahasiswa}" th:object="${registerMahasiswaDTO}" method="post">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nama Lengkap</label>
                        <input type="text" class="form-control" th:field="*{nama}"required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">NIM</label>
                        <input type="text" class="form-control" th:field="*{nim}"required>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Program Studi</label>
                        <input type="text" class="form-control" th:field="*{prodi}"required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Semester</label>
                        <input type="number" min="1" max="14" class="form-control" th:field="*{semester}"required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" th:field="*{email}"required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Nomor HP</label>
                    <input type="text" class="form-control" th:field="*{noHp}"required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" th:field="*{password}" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                    <i class="bi bi-check-circle me-1"></i> Daftar
                </button>
            </form>

            <p class="text-center mt-3 mb-0">
                Sudah punya akun? <a href="/login" class="text-primary fw-semibold">Login di sini</a>
            </p>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
